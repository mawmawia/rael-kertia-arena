<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Rael Kertia Arena</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--bg:#0a0f1e; --text:#e5e7eb; --nav:#0b1222}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none}
  body{margin:0; background:var(--bg); color:var(--text); font-family:system-ui; overflow:hidden}
.wrap{height:100vh; display:flex; flex-direction:column}
  header{display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:#0b1222; border-bottom:1px solid #1f2937}
.profile{display:flex; align-items:center; gap:8px; cursor:pointer}
.logo{width:32px; height:32px; border-radius:50%; object-fit:cover; border:2px solid #4ade80}
.profile-info{font-size:12px}
.profile-info.name{font-weight:700}
.profile-info.rank{font-size:10px; color:#9aa3b2}
.hud{display:flex; gap:6px; font-size:11px}
.pill{padding:4px 7px; background:#0f172a; border:1px solid #1f2937; border-radius:999px}
.goal{font-size:11px; color:#f59e0b; text-align:center; padding:5px; display:flex; gap:10px; justify-content:center}
.timer{color:#ef4444; font-weight:700}
.boardWrap{flex:1; display:flex; align-items:center; justify-content:center; padding:8px}
.board{display:grid; grid-template-columns:repeat(8, 1fr); gap:2px; width:min(98vw, 480px); height:min(98vw, 480px); max-height:55vh; background:#0b1222; padding:5px; border-radius:14px; border:1px solid #1f2937}
.tile{border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:min(5.5vw,26px); font-weight:900; background:#1a2333; border:1px solid #2d3748; touch-action:none; cursor:pointer; transition:transform.1s, box-shadow.1s}
.tile:active{transform:scale(1.05); box-shadow:0 0 15px rgba(74,222,128,0.6)}
.tile.empty{background:#0b1222; border:1px dashed #1f2937}
.suit-d{background:#ffffff; color:#0a0f1e}
.suit-s{background:#3b82f6; color:#fff}
.suit-h{background:#ef4444; color:#fff}
.suit-c{background:#22c55e; color:#fff}
.bottomNav{display:flex; justify-content:space-around; padding:6px 0; background:var(--nav); border-top:1px solid #1f2937}
.navBtn{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px; background:none; border:none; color:#9aa3b2; font-size:10px; cursor:pointer}
.navBtn.active{color:#4ade80}
.navBtn svg{width:20px; height:20px}
.footer{display:flex; gap:6px; padding:8px; background:#0b1222}
  button{flex:1; padding:9px; border:none; border-radius:10px; background:#111827; color:var(--text); font-weight:700; border:1px solid #1f2937; font-size:12px}
  button.primary{background:linear-gradient(180deg,#16a34a,#15803d)}
.toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#0f172a; border:1px solid #1f2937; padding:8px 12px; border-radius:999px; opacity:0; transition:.2s; z-index:999}
.toast.show{opacity:1}
.scorePop{position:absolute; color:#4ade80; font-weight:800; font-size:16px; animation:pop 600ms ease-out forwards; pointer-events:none}
@keyframes pop{0%{opacity:0; transform:translateY(0)} 30%{opacity:1} 100%{opacity:0; transform:translateY(-30px)}}
.modal{position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:100}
.modal.show{display:flex}
.card{width:90vw; max-width:360px; background:#0b1222; border:1px solid #1f2937; border-radius:16px; padding:18px; text-align:center}
.action-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px}
.action-grid button{padding:12px; font-size:11px}
.duelTable{width:100%; font-size:11px; margin-top:12px}
.duelTable td{padding:6px; border-bottom:1px solid #1f2937; text-align:left}
.duelTable.crown{color:#fbbf24}
.difficulty{font-size:10px; color:#f59e0b; margin-top:4px}
.dailyReward{font-size:28px; margin:10px 0; animation:bounce 0.6s ease}
@keyframes bounce{0%,100%{transform:scale(1)} 50%{transform:scale(1.2)}}
</style>
<script src='//libtl.com/sdk.js' data-zone='11148292' data-sdk='show_11148292'></script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="profile" onclick="openProfile()">
      <img class="logo" id="userPic" src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest">
      <div class="profile-info">
        <div class="name"><span id="userName">Guest</span></div>

    <div class="hud">
      <div class="pill">🏆<span id="points">0</span></div>

    </div>
  </header>

  <div class="goal" id="goalBar">
    <span>0/20 ♦️</span><span class="timer" id="timer">2:00</span><span>Moves:0</span>
  </div>

  <div class="boardWrap"><div id="board" class="board"></div></div>

  <div class="footer">
    <button class="primary" id="btnShuffle">🔄 Shuffle <span id="shuffleCount">(10)</span></button>

  <div class="bottomNav">

    <button class="navBtn" onclick="showTab('duel')">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M2 2h20v20H2z"/></svg>

    <button class="navBtn" onclick="showTab('leaderboard')">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>Top</span>

    <button class="navBtn" onclick="showTab('store')">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M7 4V2h10v2h5v2H2V4h5zm2 4h6v12H9V8zm-4 0h2v12H5V8zm12 0h2v12h-2V8z"/></svg>
      <span>Store</span>

</div>

<div id="dailyModal" class="modal">
  <div class="card">
    <h2>🎁 Daily Bonus!</h2>
    <div class="dailyReward">+50 🏆</div>
    <p>Come back tomorrow for more rewards!</p>
    <button class="primary" onclick="closeModal('dailyModal')" style="width:100%">Claim & Play</button>
  </div>
</div>

<div id="endModal" class="modal">
  <div class="card">
    <h2 id="endTitle">Round Complete!</h2>
    <div style="font-size:32px; margin:10px 0" id="endModalStars">⭐</div>
    <div style="font-size:18px">Points: <span id="endPoints">0</span></div>
    <div style="font-size:12px; color:#9aa3b2" id="endTime">Time: 1:23</div>
    <div class="action-grid">
      <button class="primary" onclick="watchAdForDouble()">📺 Double Points</button>
      <button onclick="nextRound()">➡️ Next Round</button>
      <button onclick="playAgain()">🔄 Play Again</button>
      <button onclick="shareReport()">📤 Challenge Friend</button>
    </div>

</div>

<div id="profileModal" class="modal">
  <div class="card">
    <img id="profilePic" src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest" style="width:64px;border-radius:50%;margin-bottom:8px">
    <h2 id="profileName">Guest</h2>
    <p>Rank: <span id="profileRank">Bronze</span></p>
    <p>Wins: <span id="profileWins">0</span></p>
    <p style="font-size:10px; color:#666" id="profileId"></p>
    <button onclick="closeModal('profileModal')" style="width:100%;margin-top:12px">Close</button>

  <div class="card">

    <div id="duelDiffText" class="difficulty"></div>
    <table class="duelTable" id="duelTable">
      <tr><td>Opponent</td><td>Result</td><td>Score</td></tr>
    </table>
    <button onclick="startGhostDuel()" class="primary" style="width:100%;margin-top:12px">Start New Duel</button>
    <button onclick="closeModal('duelModal')" style="width:100%;margin-top:8px">Close</button>

</div>

<div id="storeModal" class="modal">
  <div class="card">
    <h2>🛒 Store - Coming Day 4</h2>
    <div style="font-size:12px; color:#9aa3b2">Disabled during 72h observation</div>
    <button onclick="closeModal('storeModal')" style="width:100%; margin-top:12px">Close</button>
  </div>
</div>

<audio id="sndMatch" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const SIZE=8;
const SUITS=[{s:'♦️',c:'suit-d'},{s:'♠️',c:'suit-s'},{s:'♣️',c:'suit-c'},{s:'♥️',c:'suit-h'}];
let grid=[], dragStart=null, lock=false;
let points=0, shuffles=10, moves=0, timer=null, timeLeft=120;
let goals={diamond:0, target:20}, level=1;

// USER + STORAGE
const user = tg.initDataUnsafe.user;
if(user){
  document.getElementById('userName').textContent = user.first_name;
  document.getElementById('profileName').textContent = user.first_name;
  document.getElementById('profileId').textContent = 'ID: ' + user.id;
  if(user.photo_url){
    document.getElementById('userPic').src = user.photo_url;
    document.getElementById('profilePic').src = user.photo_url;
  }
}

let wins = parseInt(localStorage.getItem('rka_wins') || '0');
let duelHistory = JSON.parse(localStorage.getItem('rka_duels') || '[]');
document.getElementById('wins').textContent = wins;
document.getElementById('profileWins').textContent = wins;
updateDuelDifficulty();

// DAILY LOGIN REWARD SYSTEM
function checkDailyReward(){
  const lastLogin = localStorage.getItem('rka_lastLogin');
  const today = new Date().toDateString();

  if(lastLogin!== today){
    // First time today - give reward
    points += 50;
    localStorage.setItem('rka_lastLogin', today);
    localStorage.setItem('rka_points', points);

    // Show modal after 1 second so game loads first
    setTimeout(()=>{
      document.getElementById('dailyModal').classList.add('show');
    }, 1000);

    updateHUD();
  }
}

// Save points on exit
window.addEventListener('beforeunload', ()=>{
  localStorage.setItem('rka_points', points);
});

// Load saved points
const savedPoints = parseInt(localStorage.getItem('rka_points') || '0');
points = savedPoints;

// GAME CORE
function init(newLevel=false){
  lock=false;
  if(newLevel) level++;
  points=0; moves=0; shuffles=10; goals={diamond:0, target:level<=3?20:100};
  timeLeft = level<=3?120:60;

  grid=Array.from({length:SIZE},()=>Array.from({length:SIZE},()=>Math.floor(Math.random()*4)));
  removeMatches();
  render();
  updateHUD();
  startTimer();
}

function removeMatches(){
  let changed=true, tries=0;
  while(changed && tries<50){
    changed=false; tries++;
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      if(c>=2 && grid[r][c]==grid[r][c-1] && grid[r][c]==grid[r][c-2]){grid[r][c]=Math.floor(Math.random()*4); changed=true}
      if(r>=2 && grid[r][c]==grid[r-1][c] && grid[r][c]==grid[r-2][c]){grid[r][c]=Math.floor(Math.random()*4); changed=true}
    }
  }
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const tile=document.createElement('div');
    if(grid[r][c]==-1){
      tile.className='tile empty';
      tile.textContent='';
    } else {
      tile.className='tile '+SUITS[grid[r][c]].c;
      tile.textContent=SUITS[grid[r][c]].s;
    }
    tile.dataset.r=r; tile.dataset.c=c;
    tile.onmousedown = dragStartHandler;
    tile.onmouseup = dragEndHandler;
    tile.ontouchstart = dragStartHandler;
    tile.ontouchend = dragEndHandler;
    board.appendChild(tile);
  }
}

function dragStartHandler(e){
  e.preventDefault();
  if(lock) return;
  const t=e.target.closest('.tile');
  if(!t || t.classList.contains('empty')) return;
  const x = e.touches?e.touches[0].clientX:e.clientX;
  const y = e.touches?e.touches[0].clientY:e.clientY;
  dragStart={r:+t.dataset.r, c:+t.dataset.c, x:x, y:y};
}

function dragEndHandler(e){
  e.preventDefault();
  if(!dragStart) return;
  const x = e.changedTouches? e.changedTouches[0].clientX : e.clientX;
  const y = e.changedTouches? e.changedTouches[0].clientY : e.clientY;
  const dx = x - dragStart.x;
  const dy = y - dragStart.y;
  if(Math.abs(dx) < 20 && Math.abs(dy) < 20){ dragStart = null; return; }
  let r2 = dragStart.r, c2 = dragStart.c;
  if(Math.abs(dx) > Math.abs(dy)){
    c2 += (dx > 0)? 1 : -1;
  } else {
    r2 += (dy > 0)? 1 : -1;
  }
  if(r2 >= 0 && r2 < SIZE && c2 >= 0 && c2 < SIZE){
    trySwap(dragStart.r, dragStart.c, r2, c2);
  }
  dragStart = null;
}

function trySwap(r1,c1,r2,c2){
  if(lock) return;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) { lock=false; return }
  lock=true;
  swap(r1,c1,r2,c2);
  const matches=findMatches();
  if(matches.length===0){
    swap(r1,c1,r2,c2);
    toast('No match');
    lock=false;
    return
  }
  moves++;
  resolve(matches);
  updateHUD();
  if(goals.diamond>=goals.target) endRound(true);
}

function swap(r1,c1,r2,c2){ const t=grid[r1][c1]; grid[r1][c1]=grid[r2][c2]; grid[r2][c2]=t }

function findMatches(){
  const m=new Set();
  for(let r=0;r<SIZE;r++){let c=0;while(c<SIZE){let s=c;while(c<SIZE&&grid[r][c]==grid[r][s])c++; if(c-s>=3)for(let k=s;k<c;k++)m.add(r+','+k)}}
  for(let c=0;c<SIZE;c++){let r=0;while(r<SIZE){let s=r;while(r<SIZE&&grid[r][c]==grid[s][c])r++; if(r-s>=3)for(let k=s;k<r;k++)m.add(k+','+c)}}
  return Array.from(m).map(s=>s.split(',').map(Number))
}

async function resolve(matches){
  let combo=1;
  while(matches.length>0){
    const pts=matches.length*10*combo;
    points+=pts;
    localStorage.setItem('rka_points', points); // Save progress
    addPop(pts);
    document.getElementById('sndMatch').play().catch(()=>{});

    matches.forEach(([r,c])=>{
      if(SUITS[grid[r][c]].s==='♦️') goals.diamond++;
      grid[r][c]=-1;
    });

    render(); await sleep(100);
    collapse(); fill(); render(); await sleep(100);
    matches=findMatches(); combo++;
  }
  lock=false;
}

function collapse(){
  for(let c=0;c<SIZE;c++){
    let write=SIZE-1;
    for(let r=SIZE-1;r>=0;r--){
      if(grid[r][c]>=0){ grid[write][c]=grid[r][c]; write-- }
    }
    for(let r=write;r>=0;r--) grid[r][c]=-1;
  }
}

function fill(){
  for(let r=0;r<SIZE;r++)
    for(let c=0;c<SIZE;c++)
      if(grid[r][c]==-1) grid[r][c]=Math.floor(Math.random()*4);
}

function addPop(v){
  const pop=document.createElement('div');
  pop.className='scorePop';
  pop.textContent='+'+v;
  document.querySelector('.boardWrap').appendChild(pop);
  setTimeout(()=>pop.remove(), 600);
}

function getRank(score){
  if(score>=100000) return 'Mythic '+Math.max(1,1000-Math.floor(score/100));
  if(score>=50000) return 'Mythic';
  if(score>=25000) return 'Legend';
  if(score>=10000) return 'Grandmaster';
  if(score>=5000) return 'Master';
  if(score>=1000) return 'Elite';
  if(score>=500) return 'Gold';
  if(score>=100) return 'Silver';
  return 'Bronze';
}

function updateHUD(){
  document.getElementById('points').textContent=points;
  document.getElementById('shuffles').textContent=shuffles;
  document.getElementById('shuffleCount').textContent='('+shuffles+')';
  document.getElementById('rank').textContent=getRank(points);
  document.getElementById('profileRank').textContent=getRank(points);
  const mins=Math.floor(timeLeft/60), secs=timeLeft%60;
  document.getElementById('goalBar').innerHTML=`
    <span>${goals.diamond}/${goals.target} ♦️</span>
    <span class="timer" id="timer">${mins}:${secs.toString().padStart(2,'0')}</span>
    <span>Moves:${moves}</span>
  `;
}

function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    updateHUD();
    if(timeLeft<=0){
      clearInterval(timer);
      endRound(false);
    }
  },1000);
}

function endRound(win){
  clearInterval(timer);
  lock=true;
  const starsWin = win? (timeLeft>60?3: timeLeft>30?2:1) : 0;
  const totalTime = level<=3?120:60;
  const usedTime = totalTime - timeLeft;
  const mins=Math.floor(usedTime/60), secs=usedTime%60;

  document.getElementById('endTitle').textContent= win?'🎉 Round Complete!':'💀 Time Up!';
  document.getElementById('endModalStars').textContent='⭐'.repeat(starsWin)+'☆'.repeat(3-starsWin);
  document.getElementById('endPoints').textContent=points;
  document.getElementById('endTime').textContent=`Time: ${mins}:${secs.toString().padStart(2,'0')} | L${level}`;
  document.getElementById('endModal').classList.add('show');
}

// DYNAMIC SHARE BRAG
function shareReport(){
  closeModal('endModal');
  const rank = getRank(points);
  const text = `I just hit ${points} points in Rael Kertia Arena! I'm ranked ${rank}. Can you do better? 🚀`;
  tg.switchInlineQuery(text, ['users', 'groups', 'channels']);
}

// GHOST DUEL PROGRESSION
function getDuelDifficulty(){
  const tier = Math.floor(wins / 5);
  if(tier >= 4) return {name:'Boss', multiplier:3.0};
  if(tier >= 3) return {name:'Expert', multiplier:2.5};
  if(tier >= 2) return {name:'Hard', multiplier:2.0};
  if(tier >= 1) return {name:'Medium', multiplier:1.5};
  return {name:'Easy', multiplier:1.0};
}

function updateDuelDifficulty(){
  const diff = getDuelDifficulty();
  document.getElementById('duelDiff').textContent = `(${diff.name})`;
  document.getElementById('duelDiffText').textContent = `Difficulty: ${diff.name}`;
}

function startGhostDuel(){
  const diff = getDuelDifficulty();
  const baseScore = Math.floor(Math.random()*1500)+500;
  const opponentScore = Math.floor(baseScore * diff.multiplier);

  const opponentNames = ['ShadowFox','IceWolf','ThunderCat','BlazeEagle','NightOwl','VoidSerpent','StormRaven','IronTiger'];
  const opponent = opponentNames[Math.floor(Math.random()*opponentNames.length)];

  const win = points > opponentScore;

  if(win){
    wins++;
    localStorage.setItem('rka_wins', wins);
    document.getElementById('wins').textContent = wins;
    document.getElementById('profileWins').textContent = wins;
    updateDuelDifficulty();
  }

  duelHistory.unshift({
    opponent: opponent,
    status: win? 'Win' : 'Lose',
    score: points,
    oppScore: opponentScore,
    crown: win,
    diff: diff.name,
    date: new Date().toLocaleDateString()
  });

  if(duelHistory.length > 20) duelHistory = duelHistory.slice(0, 20);
  localStorage.setItem('rka_duels', JSON.stringify(duelHistory));

  renderDuelTable();
  toast(win? `You won vs ${diff.name}! 👑` : `Lost to ${diff.name}. Train more!`);
  document.getElementById('duelModal').classList.add('show');
}

function renderDuelTable(){
  const table = document.getElementById('duelTable');
  table.innerHTML = '<tr><td>Opponent</td><td>Result</td><td>Score</td></tr>';
  if(duelHistory.length === 0){
    table.innerHTML += '<tr><td colspan="3" style="text-align:center;color:#666">No duels yet</td></tr>';
    return;
  }
  duelHistory.forEach(d=>{
    table.innerHTML += `
      <tr>
        <td>${d.opponent} <span style="color:#f59e0b;font-size:9px">${d.diff||'Easy'}</span></td>
        <td class="${d.crown? 'crown' : ''}">${d.status}</td>
        <td>${d.score} vs ${d.oppScore}</td>
      </tr>
    `;
  });
}

// BUTTONS
function nextRound(){
  closeModal('endModal');
  setTimeout(()=>init(true), 100);
}

function playAgain(){
  closeModal('endModal');
  setTimeout(()=>init(false), 100);
}

async function watchAdForDouble(){
  try{
    await safeShowAd();
    points*=2;
    localStorage.setItem('rka_points', points);
    document.getElementById('endPoints').textContent=points;
    toast('Points doubled! x2');
    closeModal('endModal');
    setTimeout(()=>init(true), 300);
  } catch(e){
    toast('Ad failed');
  }
}

async function safeShowAd(){
  if(typeof show_11148292 === 'function'){
    console.log('Ad started');
    return await show_11148292();
  } else {
    toast('Ad loading...');
    return Promise.reject('SDK not ready');
  }
}

document.getElementById('btnShuffle').onclick=async()=>{
  if(shuffles>0){
    shuffles--;
    shuffleBoard();
    updateHUD();
    return;
  }
  toast('Watch ad for +5 shuffles...');
  try{
    await safeShowAd();
    shuffles=5;
    shuffleBoard();
    updateHUD();
    toast('+5 shuffles added');
  } catch(e){
    toast('Ad failed');
  }
}

function shuffleBoard(){
  let flat=grid.flat();
  do{ flat.sort(()=>Math.random()-0.5); let i=0; for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)grid[r][c]=flat[i++] }
  while(findMatches().length>0);
  render();
}

function closeModal(id){
  document.getElementById(id).classList.remove('show');
}

function openProfile(){
  document.getElementById('profileModal').classList.add('show');
}

function showTab(tab){
  document.querySelectorAll('.navBtn').forEach(b=>b.classList.remove('active'));
  event.target.closest('.navBtn').classList.add('active');

  if(tab==='duel'){
    renderDuelTable();
    document.getElementById('duelModal').classList.add('show');
  } else if(tab==='leaderboard'){
    toast('Leaderboard manual for now');
  } else if(tab==='store'){
    document.getElementById('storeModal').classList.add('show');
  } else {
    closeModal('storeModal');
    closeModal('duelModal');
  }
}

document.getElementById('btnDuel').onclick=()=>showTab('duel');

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1400) }
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// INIT + DAILY REWARD CHECK
init();
checkDailyReward();
</script>
</body>
</html>
