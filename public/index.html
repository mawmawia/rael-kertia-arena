<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Rael Kertia Arena</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0a0f1e; --text:#e5e7eb; --nav:#0b1222}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none}
body{margin:0; background:var(--bg); color:var(--text); font-family:system-ui; overflow:hidden}
.wrap{height:100vh; display:flex; flex-direction:column}
header{display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:#0b1222; border-bottom:1px solid #1f2937}
.boardWrap{flex:1; display:flex; align-items:center; justify-content:center; padding:8px}
.board{display:grid; grid-template-columns:repeat(8, 1fr); gap:2px; width:min(98vw, 480px); height:min(98vw, 480px); background:#0b1222; padding:5px; border-radius:14px; border:1px solid #1f2937}
.tile{border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:20px; background:#1a2333; border:1px solid #2d3748; cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
<header>
<div>User: <span id="userName">Guest</span></div>
<div>Score: <span id="points">0</span></div>
</header>
<div class="boardWrap"><div id="board" class="board"></div></div>
</div>

<script>
// 1. CONFIGURATION
const SUPABASE_URL = 'https://iyjydmwwtpodkztinmvz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5anlkbXd3dHBvZGt6dGlubXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTcwMDksImV4cCI6MjA5NzE3MzAwOX0.F0haBMVkorGTAdwlq3oXaUuvaGSTyW7DK3y-W3IgACE'; // <--- PASTE KEY HERE
const supabase = tg = window.Telegram.WebApp;
tg.expand();

let points = 0;
let inventory = { ufo: 0, laser: 0, bomb: 0 };

// 2. SUPABASE SYNC LOGIC
async function initializePlayer() {
const user = tg.initDataUnsafe.user;
if (!user) return;

document.getElementById('userName').textContent = user.first_name;

// Try to fetch existing data
let { data, error } = await supabase
.from('users')
.select('*')
.eq('id', user.id.toString())
.single();

if (error && error.code === 'PGRST116') {
// New user, create row
await supabase.from('users').insert({ id: user.id.toString() });
} else if (data) {
points = data.high_score;
inventory = data.inventory;
document.getElementById('points').textContent = points;
}
}

async function syncToCloud() {
const user = tg.initDataUnsafe.user;
if (!user) return;
await supabase.from('users').upsert({
id: user.id.toString(),
high_score: points,
inventory: inventory
});
}

// 3. GAME INIT
function initBoard() {
const board = document.getElementById('board');
for(let i=0; i<64; i++) {
const tile = document.createElement('div');
tile.className = 'tile';
tile.textContent = '💎';
tile.onclick = () => {
points += 10;
document.getElementById('points').textContent = points;
syncToCloud(); // Save every click (or save at game end to save bandwidth)
};
board.appendChild(tile);
}
}

initializePlayer();
initBoard();
</script>
</body>
</html>
