<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Rael Kertia Arena - No DB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e27;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
h1{margin-bottom:10px;font-size:20px}
#board{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;background:#1a1f3a;padding:12px;border-radius:14px;margin:15px 0}
.cell{width:42px;height:42px;background:#2a2f4a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:0.2s}
.cell.selected{background:#4a5fc1;transform:scale(1.1)}
.cell.hint{background:#3a7a4a}
#info{margin-top:15px;text-align:center}
#coins{font-size:18px;color:#ffd700;margin-bottom:8px}
button{background:#4a5fc1;border:none;color:#fff;padding:10px 20px;border-radius:8px;margin:5px;cursor:pointer}
</style>
</head>
<body>
<h1>Rael Kertia Arena</h1>
<div id="coins">Coins: <span id="coinCount">100</span></div>
<div id="board"></div>
<div id="info">
  <button onclick="resetGame()">Reset Board</button>
  <div id="status">Tap a piece to move</div>
</div>

<script>
let board = Array(64).fill('');
let selected = null;
let coins = 100;

// Setup: pawns + 2 knights
for(let i=8; i<16; i++) board[i] = '♙';
board[1] = '♞'; board[6] = '♞';

function render(){
  const b = document.getElementById('board');
  b.innerHTML = '';
  board.forEach((p,i)=>{
    const cell = document.createElement('div');
    cell.className = 'cell';
    if(i===selected) cell.classList.add('selected');
    cell.textContent = p;
    cell.onclick = ()=>clickCell(i);
    b.appendChild(cell);
  });
}

function clickCell(i){
  if(selected===null && board[i]){
    selected = i;
    document.getElementById('status').textContent = 'Selected. Tap empty cell to move';
  } else if(selected!==null){
    if(board[i]===''){
      board[i] = board[selected];
      board[selected] = '';
      coins += 1; // reward for move
      document.getElementById('coinCount').textContent = coins;
      document.getElementById('status').textContent = 'Moved! +1 coin';
    }
    selected = null;
  }
  render();
}

function resetGame(){
  board = Array(64).fill('');
  for(let i=8; i<16; i++) board[i] = '♙';
  board[1] = '♞'; board[6] = '♞';
  coins = 100;
  document.getElementById('coinCount').textContent = coins;
  document.getElementById('status').textContent = 'Board reset';
  selected = null;
  render();
}

render();
</script>
</body>
</html>
