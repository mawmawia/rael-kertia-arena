<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rael Kertia Arena - Survival</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0f1e; --text: #e5e7eb; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        .wrap { height: 100vh; display: flex; flex-direction: column; }
        .board { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; width: 95vw; height: 95vw; margin: auto; }
        .tile { background: #111827; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #skillBar { position: fixed; right: 10px; top: 100px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .skill-btn { width: 45px; height: 45px; background: #1f2937; border: 2px solid #4ade80; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrap">
        <header style="padding: 10px; text-align: center;">
            Wave: <span id="waveDisplay">1</span> | Score: <span id="scoreDisplay">0</span>
        </header>

        <div id="skillBar">
            <div class="skill-btn" onclick="activateSkill('ufo')">🛸<br><span id="count-ufo">0</span></div>
            <div class="skill-btn" onclick="activateSkill('laser')">⚡<br><span id="count-laser">0</span></div>
            <div class="skill-btn" onclick="activateSkill('bomb')">💣<br><span id="count-bomb">0</span></div>
        </div>

        <div id="board" class="board"></div>
    </div>

    <script>
        // CONFIG - REPLACE THESE ON VERCEL ENV VARIABLES
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let inventory = { ufo: 0, laser: 0, bomb: 0 };
        let wave = 1;
        let score = 0;

        function updateSkillUI() {
            document.getElementById('count-ufo').textContent = inventory.ufo;
            document.getElementById('count-laser').textContent = inventory.laser;
            document.getElementById('count-bomb').textContent = inventory.bomb;
        }

        function activateSkill(type) {
            if(inventory[type] > 0) {
                alert(`Deploying ${type}! Click a tile.`);
                // Logic to handle next click as deployment
            }
        }

        // Initialize board logic...
        console.log("Arena Initialized");
    </script>
</body>
</html>
