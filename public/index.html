<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rael Match Arena</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//monetag.com/sdk/rewarded.js' data-zone='3371302'></script>
<script src='//monetag.com/sdk/interstitial.js' data-zone='3371302'></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1929;color:#fff;font-family:-apple-system,Arial;text-align:center;padding:15px}
.card{background:#1a2f45;border-radius:20px;padding:15px;margin:10px auto;max-width:400px}
.stats{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:300px;margin:15px auto}
.tile{aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:transform 0.15s}
.tile:active{transform:scale(0.9)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(90deg,#25a25a,#1e8e4e);color:white;font-size:16px;font-weight:bold;margin:8px 0}
.btn-stars{background:linear-gradient(90deg,#ffd700,#ff6b00);color:#000}
.moves{font-size:18px;margin:10px}
.stars{display:flex;justify-content:center;gap:5px;margin:10px 0;font-size:24px}
</style>
</head>
<body>
<h1>Rael Match Arena</h1>

<div class="card">
  <div class="stats">
    <span>Level: <b id="level">1</b></span>
    <span>Coins: <b id="coins">0</b></span>
    <span>Revives: <b id="revives">3</b></span>
  </div>

  <div class="moves">Moves: <b id="moves">15</b> | Score: <b id="score">0</b> | Time: <b id="time">0s</b></div>

  <div class="stars" id="starsDisplay">⭐</div>

  <div class="grid" id="grid"></div>

  <button class="btn" onclick="skillRevive()">+5 Moves - Watch Ad</button>
  <button class="btn btn-stars" onclick="buyNoAds()">Remove Ads 250⭐</button>
</div>

<script>
const tg = Telegram.WebApp;
tg.expand();

const emojis = ['💎','🔷','🔶','💚','💜'];
let board = [];
let selected = null;
let moves = 15;
let score = 0;
let coins = 0;
let level = 1;
let revives = 3;
let gamesPlayed = 0;
let hasPremium = false;
let startTime = 0;
let timer = null;
let pendingMultiplier = 1; // for double points ad

// INIT BOARD
function initBoard() {
  board = [];
  for(let i=0; i<25; i++) {
    board.push(emojis[Math.floor(Math.random()*5)]);
  }
  // remove auto-matches
  for(let i=0; i<25; i++) {
    while(checkMatchAt(i)) {
      board[i] = emojis[Math.floor(Math.random()*5)];
    }
  }
  moves = 15;
  score = 0;
  startTime = Date.now();
  clearInterval(timer);
  timer = setInterval(updateTime, 1000);
  render();
}

function updateTime() {
  const elapsed = Math.floor((Date.now() - startTime)/1000);
  document.getElementById('time').textContent = elapsed + 's';
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  board.forEach((emoji, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.textContent = emoji;
    tile.style.background = selected === idx? '#25a25a' : '#0f2742';
    tile.onclick = () => clickTile(idx);
    grid.appendChild(tile);
  });
  updateUI();
}

function clickTile(idx) {
  if(selected === null) {
    selected = idx;
    render();
  } else {
    if(isAdjacent(selected, idx)) {
      swap(selected, idx);
      if(!hasMatch()) {
        swap(selected, idx);
        tg.showAlert('No match!');
      } else {
        moves--;
        processMatches();
      }
    }
    selected = null;
    render();

    if(moves <= 0) endGame();
  }
}

function isAdjacent(a,b) {
  const diff = Math.abs(a-b);
  return (diff === 1 && Math.floor(a/5) === Math.floor(b/5)) || diff === 5;
}

function swap(a,b) {
  [board[a], board[b]] = [board[b], board[a]];
}

function hasMatch() {
  for(let i=0; i<25; i++) if(checkMatchAt(i)) return true;
  return false;
}

function checkMatchAt(i) {
  const e = board[i];
  const x = i % 5, y = Math.floor(i/5);
  if(x<3 && board[i+1]===e && board[i+2]===e) return true;
  if(y<3 && board[i+5]===e && board[i+10]===e) return true;
  return false;
}

function processMatches() {
  let matched = false;
  for(let i=0; i<25; i++) {
    if(checkMatchAt(i)) {
      score += 10;
      matched = true;
      board[i] = emojis[Math.floor(Math.random()*5)];
    }
  }
  if(matched) {
    setTimeout(() => {render(); processMatches()}, 200);
  } else if(score >= level*100) {
    clearLevel();
  }
}

// STAR RATING SYSTEM based on time
function getStars(timeSeconds) {
  if(timeSeconds <= 30) return 3;
  if(timeSeconds <= 60) return 2;
  if(timeSeconds <= 120) return 1;
  return 0;
}

function getMultiplier(stars) {
  if(stars === 3) return 1.5; // +50%
  if(stars === 2) return 1.3; // +30%
  if(stars === 1) return 1.2; // +20%
  return 1.0;
}

function clearLevel() {
  clearInterval(timer);
  const timeTaken = Math.floor((Date.now() - startTime)/1000);
  const stars = getStars(timeTaken);
  const baseCoins = Math.floor(score * 0.5); // 0.5 coins per point
  const multiplier = getMultiplier(stars);

  // Show stars popup
  document.getElementById('starsDisplay').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);

  // Store pending reward for ad double
  pendingMultiplier = multiplier;

  tg.showAlert(`Level ${level} Complete!\nTime: ${timeTaken}s\nStars: ${stars}⭐\nBase: ${baseCoins} coins\nBonus: +${Math.floor(baseCoins * (multiplier-1))} coins\nWatch ad to DOUBLE coins?`,
    () => showDoubleAd(baseCoins, multiplier));

  level++;
  setTimeout(initBoard, 3000);
}

function showDoubleAd(baseCoins, multiplier) {
  if(typeof showRewarded === 'function') {
    showRewarded().then(() => {
      // User watched ad = 2x coins
      const finalCoins = Math.floor(baseCoins * multiplier * 2);
      coins += finalCoins;
      tg.showAlert(`+${finalCoins} coins! 2x bonus applied`);
      updateUI();
    }).catch(e => {
      // No ad = normal coins
      const finalCoins = Math.floor(baseCoins * multiplier);
      coins += finalCoins;
      tg.showAlert(`+${finalCoins} coins!`);
      updateUI();
    });
  } else {
    const finalCoins = Math.floor(baseCoins * multiplier);
    coins += finalCoins;
    updateUI();
  }
}

function endGame() {
  clearInterval(timer);
  if(revives > 0) {
    tg.showAlert(`Out of moves! Score ${score}. Watch ad for +5 moves?`, skillRevive);
  } else {
    tg.showAlert(`Game Over! Final Score: ${score}`);
  }

  // Monetag interstitial every 2 levels
  gamesPlayed++;
  if(gamesPlayed % 2 === 0 &&!hasPremium && typeof showInterstitial === 'function') {
    showInterstitial();
  }
}

// MONETAG REWARDED for +5 moves
function skillRevive() {
  if(revives <= 0) return tg.showAlert('No revives left');

  if(typeof showRewarded === 'function') {
    showRewarded().then(() => {
      revives--;
      moves += 5;
      updateUI();
      tg.showAlert('+5 moves added!');
    }).catch(e => {
      tg.showAlert('Watch full ad for moves');
    });
  }
}

// TELEGRAM STARS 250⭐ for no ads
function buyNoAds() {
  if(hasPremium) return tg.showAlert('You already have Premium');

  tg.openInvoice({
    title: 'No Ads Premium',
    description: 'Remove all ads forever + 2x coins',
    payload: 'no_ads_v3',
    currency: 'XTR',
    prices: [{label: 'Premium', amount: 250}] // 250 Stars = ~$1.99
  }, (status) => {
    if(status === 'paid') {
      hasPremium = true;
      tg.showAlert('Premium activated! No more ads + 2x coins');
      updateUI();
    }
  });
}

function updateUI() {
  document.getElementById('level').textContent = level;
  document.getElementById('coins').textContent = coins;
  document.getElementById('revives').textContent = revives;
  document.getElementById('moves').textContent = moves;
  document.getElementById('score').textContent = score;
}

initBoard();
</script>
</body>
</html>
