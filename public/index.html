<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rael Kertia Arena</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
<!-- MONETAG SDK with your ID 3371302 -->
<script src='//monetag.com/sdk/rewarded.js' data-zone='3371302'></script>
<script src='//monetag.com/sdk/interstitial.js' data-zone='3371302'></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1929;color:#fff;font-family:-apple-system,Arial;text-align:center;padding:15px;overflow:hidden}
.card{background:#1a2f45;border-radius:20px;padding:20px;margin:10px auto;max-width:400px}
.stats{display:flex;justify-content:space-between;margin-bottom:15px;font-size:14px}
canvas{background:#0f2742;border-radius:16px;touch-action:none;width:300px;height:300px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(90deg,#25a25a,#1e8e4e);color:white;font-size:16px;font-weight:bold;margin:8px 0;cursor:pointer}
.btn:active{transform:scale(0.97)}
.btn-premium{background:linear-gradient(90deg,#ffd700,#ff6b00);color:#000}
.seed{font-size:11px;color:#647b8c;margin-top:8px}
</style>
</head>
<body>
<h1 style="margin-bottom:10px">Rael Kertia Arena</h1>

<div class="card">
  <div class="stats">
    <span>Level: <b id="level">1</b></span>
    <span>Coins: <b id="coins">0</b></span>
    <span>Revives: <b id="revives">3</b></span>
  </div>

  <canvas id="game" width="300" height="300"></canvas>

  <button class="btn" id="startBtn" onclick="startGame()">START GAME</button>
  <button class="btn" onclick="skillRevive()">Skill Revive - Watch Ad</button>
  <button class="btn btn-premium" onclick="buyPremium()">Remove Ads $1.99</button>

  <div class="seed">Seed: <span id="seed">0</span> - Transparent RNG</div>
</div>

<script>
const tg = Telegram.WebApp;
tg.expand();

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let level = 1;
let coins = 0;
let revives = 3;
let gamesPlayed = 0;
let target = {x:150, y:150, size:40};
let particles = [];
let score = 0;
let timeLeft = 30;
let gameActive = false;
let audioCtx;
let duelId = new URLSearchParams(window.location.search).get('duel');

// AUDIO
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if(!audioCtx) initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);

  if(type === 'click') {
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  }
  if(type === 'levelup') {
    osc.frequency.value = 600;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  }
}

// PARTICLES
function createParticles(x, y, color) {
  for(let i=0; i<12; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 30, color: color
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.95; p.vy *= 0.95;
    return p.life > 0;
  });
}
function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 30;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// GAME LOGIC
function generateLevel(lvl) {
  const seed = lvl * 69420;
  Math.seedrandom(seed);
  document.getElementById('seed').textContent = seed;
  target.size = Math.max(18, 45 - level * 1.2);
  spawnTarget();
}
function spawnTarget() {
  target.x = Math.random() * 260 + 20;
  target.y = Math.random() * 260 + 20;
}

function gameLoop() {
  if(!gameActive) return;
  ctx.clearRect(0, 0, 300, 300);

  ctx.fillStyle = '#25a25a';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#25a25a';
  ctx.beginPath(); ctx.arc(target.x, target.y, target.size, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  updateParticles(); drawParticles();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Arial';
  ctx.fillText(`Time: ${timeLeft}s`, 10, 30);
  ctx.fillText(`Score: ${score}`, 10, 55);

  requestAnimationFrame(gameLoop);
}

function clickTarget(e) {
  if(!gameActive) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;

  const dist = Math.sqrt((x - target.x)**2 + (y - target.y)**2);

  if(dist < target.size) {
    score++; coins++;
    playSound('click');
    createParticles(target.x, target.y, '#25a25a');
    canvas.style.transform = 'translate(2px, -2px)';
    setTimeout(() => canvas.style.transform = 'translate(0,0)', 50);
    spawnTarget();
  }
}

function startGame() {
  document.getElementById('startBtn').style.display = 'none';
  gameActive = true; score = 0; timeLeft = 30;

  generateLevel(level);
  gameLoop();

  const timer = setInterval(() => {
    timeLeft--;
    if(timeLeft <= 0) {
      clearInterval(timer);
      endGame();
    }
  }, 1000);
}

function endGame() {
  gameActive = false;
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('startBtn').textContent = 'PLAY AGAIN';

  if(score >= 20 + level * 2) {
    clearLevel();
  } else if(revives > 0) {
    tg.showAlert(`Score: ${score}. Need ${20 + level * 2} to level up. Use Skill Revive?`);
  }

  saveScore();

  // MONETAG INTERSTITIAL every 2 games
  gamesPlayed++;
  if(gamesPlayed % 2 === 0 && typeof showInterstitial === 'function') {
    showInterstitial();
  }
}

function clearLevel() {
  coins += 10 + Math.floor(level * 0.5);
  level++;
  revives = Math.min(revives + 1, 3);
  playSound('levelup');
  tg.showAlert(`Level ${level} unlocked! +${10 + Math.floor((level-1) * 0.5)} coins`);
  updateUI();
}

// MONETAG REWARDED for Skill Revive
function skillRevive() {
  if(revives <= 0) return tg.showAlert('No revives left today');

  if(typeof showRewarded === 'function') {
    showRewarded().then(() => {
      revives--;
      updateUI();
      tg.showAlert('Revive earned! Continue playing');
    }).catch(e => {
      tg.showAlert('Ad skipped. No revive given');
    });
  } else {
    tg.showAlert('Ad not loaded. Tap canvas 3 times fast');
    let hits = 0;
    const test = () => {
      if(++hits >= 3) {
        revives--; updateUI();
        tg.showAlert('Skill test passed! Revive earned');
        canvas.onclick = clickTarget;
      }
    };
    canvas.onclick = () => test();
    setTimeout(() => canvas.onclick = clickTarget, 3000);
  }
}

function buyPremium() {
  tg.openInvoice('your_invoice_link_here'); // Get from @BotFather
}

function saveScore() {
  const user = tg.initDataUnsafe.user;
  if(!user) return;
  fetch('/api/score', {
    method: 'POST',
    body: JSON.stringify({
      id: user.id,
      name: user.first_name,
      level: level,
      score: coins,
      chat: tg.initDataUnsafe.chat?.id || user.id,
      duel: duelId
    })
  });
}

function updateUI() {
  document.getElementById('level').textContent = level;
  document.getElementById('coins').textContent = coins;
  document.getElementById('revives').textContent = revives;
}

canvas.addEventListener('click', clickTarget);
canvas.addEventListener('touchstart', clickTarget);
updateUI();
</script>
</body>
</html>
